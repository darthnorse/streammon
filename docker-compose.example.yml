# StreamMon - Media Server Monitoring
# Copy this file to docker-compose.yml and run: docker compose up -d
#
# First run will prompt you to create an admin account at http://localhost:7935

services:
  streammon:
    image: ghcr.io/darthnorse/streammon:latest
    container_name: streammon
    ports:
      - "7935:7935"
    volumes:
      - ./data:/app/data
      - ./geoip:/app/geoip
    environment:
      # TOKEN_ENCRYPTION_KEY is auto-generated on first run and stored in the
      # data volume. Override here only if you want to use your own key.
      # - TOKEN_ENCRYPTION_KEY=your-key-here
    restart: unless-stopped
