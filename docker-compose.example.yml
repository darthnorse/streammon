# StreamMon - Media Server Monitoring
# Copy this file to docker-compose.yml and run: docker compose up -d
#
# First run will prompt you to create an admin account at http://localhost:7935

services:
  streammon:
    image: ghcr.io/darthnorse/streammon:latest
    container_name: streammon
    ports:
      - "7935:7935"
    volumes:
      - ./data:/app/data
      - ./geoip:/app/geoip
    environment:
      # Required: encrypts API keys and tokens at rest.
      # Generate with: openssl rand -base64 32
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      # Optional: set to match your host user (useful for Synology/Unraid/TrueNAS)
      # - PUID=1000
      # - PGID=1000
    restart: unless-stopped
    # Graceful shutdown persists in-progress watch sessions before exiting
    # (HTTP drain + cleanup budget totals ~25s internally) -- raised above
    # Docker's 10s default so that fits with room to spare before SIGKILL.
    stop_grace_period: 30s
